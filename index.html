<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Tracking Photos</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script type="text/javascript" src="https://www.17track.net/externalcall.js"></script>
  <style>
    :root {
      --primary: #6366f1;
      --pl: #818cf8;
      --bg: #0a0f1e;
      --card: rgba(20, 30, 55, .78);
      --inp: rgba(10, 15, 35, .7);
      --txt: #f1f5f9;
      --muted: #94a3b8;
      --bdr: rgba(255, 255, 255, .09);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }

    body {
      background: var(--bg);
      background-image: radial-gradient(ellipse at 80% 0%, rgba(34, 211, 238, .15), transparent 50%), 
                        radial-gradient(ellipse at 10% 100%, rgba(99, 102, 241, .15), transparent 50%);
      color: var(--txt);
      min-height: 100vh;
      padding: 28px 16px 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .ph { text-align: center; margin-bottom: 32px; width: 100%; max-width: 940px; }
    .ph h1 {
      font-size: clamp(1.6rem, 4vw, 2.6rem);
      font-weight: 700;
      background: linear-gradient(135deg, #22d3ee, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .card {
      background: var(--card);
      backdrop-filter: blur(18px);
      border: 1px solid var(--bdr);
      border-radius: 20px;
      padding: 26px;
      width: 100%;
      max-width: 940px;
      box-shadow: 0 28px 56px rgba(0, 0, 0, .35);
      margin-bottom: 22px;
    }

    /* Search Box */
    .sbox { position: relative; margin-bottom: 14px; }
    .sbox .si {
      position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
      font-size: 1.1rem; pointer-events: none;
    }
    .sbox input {
      width: 100%; background: var(--inp); border: 1.5px solid var(--bdr);
      border-radius: 13px; padding: 14px 16px 14px 48px;
      color: var(--txt); font-size: 1rem; outline: none;
    }
    .sbox input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99, 102, 241, .2); }

    /* Results */
    #rgrid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 18px;
    }
    .rc { background: rgba(10, 15, 35, .72); border: 1px solid var(--bdr); border-radius: 15px; overflow: hidden; cursor: pointer; }
    .rc:hover { transform: translateY(-4px); box-shadow: 0 14px 38px rgba(99, 102, 241, .22); }
    .rc img { width: 100%; height: 175px; object-fit: cover; }

    /* Modal - Full Size Photo */
    #imod {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,.95);
      z-index: 10000; align-items: center; justify-content: center;
      flex-direction: column; padding: 20px; overflow-y: auto;
    }
    #imod.open { display: flex; }

    .modal-content {
      max-width: 100%;
      width: 100%;
      max-width: 720px;
    }

    .modal-photo {
      width: 100%;
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 20px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.6);
    }
    .modal-photo img {
      width: 100%;
      height: auto;
      display: block;
      max-height: 55vh;
      object-fit: contain;
      background: #000;
    }

    .track-section {
      background: rgba(20, 30, 55, 0.9);
      border: 1px solid var(--bdr);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .cm {
      position: fixed; top: 20px; right: 20px; font-size: 1.8rem;
      color: #fff; background: rgba(0,0,0,0.5); border: none;
      width: 50px; height: 50px; border-radius: 50%; cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="ph">
    <h1>🔎 Search Tracking Photos</h1>
    <p>Find your photo using the last 5 digits of your phone number.</p>
  </div>

  <!-- Search -->
  <div class="card">
    <div class="sbox"><span class="si">🔍</span>
      <input type="text" id="si" placeholder="Enter last 5 digits of your phone number..." autocomplete="off" autofocus oninput="doSearch()">
    </div>
  </div>

  <!-- Results -->
  <div class="card">
    <div id="rc">
      <div class="sb" id="init-st">
        <div class="si2">🔎</div>
        <h3>Start searching</h3>
        <p>Type the last 5 digits of your phone number above.</p>
      </div>
      <div id="rgrid"></div>
    </div>
  </div>

  <!-- Modal -->
  <div id="imod">
    <button class="cm" onclick="closeMod()">✕</button>
    
    <div class="modal-content">
      <!-- Full Size Photo -->
      <div class="modal-photo">
        <img id="mimg" src="" alt="Parcel Photo">
      </div>

      <!-- Tracking Input -->
      <div class="track-section">
        <label style="display:block; font-size:0.8rem; color:var(--pl); margin-bottom:8px; font-weight:700;">
          🚚 Enter Tracking Number (AWB) from Photo
        </label>
        <div style="display:flex; gap:10px;">
          <input type="text" id="manual-awb" placeholder="Type AWB / Tracking ID here..." 
                 style="flex:1; background:var(--inp); border:1px solid var(--bdr); border-radius:10px; padding:14px; color:#fff; font-size:1rem;">
          <button onclick="startManualTrack()" 
                  style="padding:0 28px; background:var(--primary); color:white; border:none; border-radius:10px; font-weight:600;">
            Track
          </button>
        </div>
      </div>

      <!-- Photo Info -->
      <div style="background:rgba(20,30,55,0.8); border:1px solid var(--bdr); border-radius:12px; padding:16px;">
        <div id="mname" style="font-weight:700; font-size:1.1rem; margin-bottom:8px;"></div>
        <div id="mmeta"></div>
      </div>
    </div>
  </div>

  <script>
    let allRecords = [];

    async function loadAndSearch() {
      try {
        const res = await fetch('https://raw.githubusercontent.com/thecraftyriz/thecraftyriz/main/records.json?v=' + Date.now());
        allRecords = await res.json();
      } catch(e) {
        console.error("Failed to load records");
      }
    }

    function doSearch() {
      const q = document.getElementById('si').value.trim().toLowerCase();
      if (q.length < 5) {
        document.getElementById('rgrid').innerHTML = '';
        return;
      }

      const matched = allRecords.filter(r => String(r.phone || '').endsWith(q));

      if (!matched.length) {
        document.getElementById('rgrid').innerHTML = `<div class="sb"><h3>No results found</h3></div>`;
        return;
      }

      document.getElementById('rgrid').innerHTML = matched.map(r => `
        <div class="rc" onclick="openMod('${r.id}')">
          <img src="${r.photoUrl}" alt="parcel" loading="lazy">
          <div style="padding:12px;">
            <div style="font-weight:700;">${r.name}</div>
            <div style="font-size:0.85rem; color:var(--muted);">📍 ${r.pincode} • 📞 ${r.phone}</div>
          </div>
        </div>
      `).join('');
    }

    function openMod(id) {
      const r = allRecords.find(x => x.id === id);
      if (!r) return;

      document.getElementById('mimg').src = r.photoUrl;
      document.getElementById('mname').textContent = `👤 ${r.name}`;
      document.getElementById('mmeta').innerHTML = `
        <span style="color:var(--muted);">📍 ${r.pincode}</span> &nbsp; 
        <span style="color:var(--muted);">📞 ${r.phone}</span>
      `;

      document.getElementById('manual-awb').value = '';
      document.getElementById('imod').classList.add('open');
    }

    function startManualTrack() {
      const awb = document.getElementById('manual-awb').value.trim();
      if (!awb) {
        alert("Please enter the tracking number from the photo");
        return;
      }
      window.location.href = `livestatus.html?awb=${encodeURIComponent(awb)}`;
    }

    function closeMod() {
      document.getElementById('imod').classList.remove('open');
    }

    // Close modal when clicking outside content
    document.getElementById('imod').addEventListener('click', e => {
      if (e.target === document.getElementById('imod')) closeMod();
    });

    // Load data
    loadAndSearch();
  </script>
</body>
</html>
