<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Tracking Status</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://www.17track.net/externalcall.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0a0f1e;
            --card: rgba(20, 30, 55, .78);
            --txt: #f1f5f9;
            --muted: #94a3b8;
            --bdr: rgba(255, 255, 255, .09);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        body {
            background: var(--bg);
            background-image: radial-gradient(ellipse at 20% 0%, rgba(99, 102, 241, .15), transparent 50%);
            color: var(--txt);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container { width: 100%; max-width: 800px; margin-top: 20px; }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
            width: 100%;
            max-width: 800px;
        }
        .header h1 {
            font-size: 1.5rem;
            background: linear-gradient(135deg, #818cf8, #22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .back-btn {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 8px 15px;
            border: 1px solid var(--bdr);
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            transition: all 0.2s;
        }
        .back-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }

        #YQContainer {
            width: 100%;
            min-height: 650px;
            border-radius: 15px;
            overflow: hidden;
            background: white;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }
        .info-card {
            background: var(--card);
            border: 1px solid var(--bdr);
            padding: 18px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
        }
        .info-card span { color: var(--primary); font-weight: 700; }

        .pincode-row {
            margin-top: 15px;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .instruction {
            font-size: 0.97rem;
            color: #fbbf24;
            font-weight: 600;
            line-height: 1.4;
        }
        .pincode-row input {
            padding: 12px 16px;
            width: 180px;
            border-radius: 8px;
            border: 1px solid var(--bdr);
            background: rgba(255,255,255,0.08);
            color: white;
            font-size: 1.1rem;
            text-align: center;
            font-weight: 500;
        }
        .pincode-row button {
            padding: 12px 28px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="javascript:history.back()" class="back-btn">← Back to Search</a>
        <h1>🚚 Live Tracking</h1>
        <div style="width:100px;"></div>
    </div>

    <div class="container">
        <div class="info-card">
            Tracking Number: <span id="awb-display">Loading...</span>
            <div class="carrier-info" id="carrier-info"></div>
            
            <!-- Delhivery Only -->
            <div class="pincode-row" id="pincode-row">
                <div class="instruction">
                    Type <strong>1</strong> and click Confirm to Check Live Tracking
                </div>
                <div style="display:flex; gap:10px; align-items:center;">
                    <input type="text" id="pincode" value="1" maxlength="6">
                    <button onclick="trackDelhivery()">Confirm & Track</button>
                </div>
            </div>
        </div>
        
        <div id="YQContainer">
            <div style="padding:80px; text-align:center; color:#666;">
                ⌛ Initializing Tracking Service...
            </div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const awb = params.get('awb')?.trim();

        let isDelhivery = false;

        if (!awb) {
            document.querySelector('.info-card').innerHTML = "❌ No tracking number provided.";
            document.getElementById('YQContainer').style.display = 'none';
        } else {
            document.getElementById('awb-display').textContent = awb;

            function getCarrierCode(trackingNum) {
                const num = trackingNum.toUpperCase().trim();

                if (num.startsWith('D')) {
                    document.getElementById('carrier-info').textContent = 'Carrier: DTDC';
                    return "100069";
                }
                if (num.startsWith('5006')) {
                    document.getElementById('carrier-info').textContent = 'Carrier: Trackon';
                    return "100180";
                }
                if (num.startsWith('356') || num.startsWith('19')) {
                    document.getElementById('carrier-info').textContent = 'Carrier: Delhivery';
                    isDelhivery = true;
                    document.getElementById('pincode-row').style.display = 'flex';
                    return "100060";
                }

                document.getElementById('carrier-info').textContent = 'Carrier: Auto Detecting...';
                return "0";
            }

            function trackDelhivery() {
                const pin = document.getElementById('pincode').value.trim();
                if (pin === "") {
                    alert("Please type 1 in the box");
                    return;
                }

                document.getElementById('YQContainer').innerHTML = '<div style="padding:100px; text-align:center; color:#666;">🔄 Loading Delhivery Tracking...</div>';

                YQV5.trackSingle({
                    YQ_ContainerId: "YQContainer",
                    YQ_Height: 650,
                    YQ_Lang: "en",
                    YQ_Num: awb,
                    YQ_Fc: "100060",
                    YQ_Extra: pin
                });
            }

            function initTracking() {
                if (typeof YQV5 !== 'undefined') {
                    document.getElementById('YQContainer').innerHTML = '';

                    const carrierCode = getCarrierCode(awb);

                    if (!isDelhivery) {
                        YQV5.trackSingle({
                            YQ_ContainerId: "YQContainer",
                            YQ_Height: 650,
                            YQ_Lang: "en",
                            YQ_Num: awb,
                            YQ_Fc: carrierCode
                        });
                    }
                } else {
                    setTimeout(initTracking, 400);
                }
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initTracking);
            } else {
                initTracking();
            }
        }
    </script>
</body>
</html>
