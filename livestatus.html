<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Tracking Status</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0a0f1e;
            --card: rgba(20, 30, 55, .78);
            --txt: #f1f5f9;
            --muted: #94a3b8;
            --bdr: rgba(255, 255, 255, .09);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        body {
            background: var(--bg);
            background-image: radial-gradient(ellipse at 20% 0%, rgba(99, 102, 241, .15), transparent 50%);
            color: var(--txt);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container { width: 100%; max-width: 900px; margin-top: 20px; }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
            width: 100%;
            max-width: 900px;
        }
        .header h1 {
            font-size: 1.5rem;
            background: linear-gradient(135deg, #818cf8, #22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .back-btn {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 8px 15px;
            border: 1px solid var(--bdr);
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            transition: all 0.2s;
        }
        .back-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
        #tracking-frame {
            width: 100%;
            min-height: 650px;
            border-radius: 15px;
            overflow: hidden;
            background: white;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            border: none;
        }
        .info-card {
            background: var(--card);
            border: 1px solid var(--bdr);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
        }
        .info-card span { color: var(--primary); font-weight: 700; }
    </style>
</head>
<body>

    <div class="header">
        <a href="javascript:history.back()" class="back-btn">← Back to Search</a>
        <h1>🚚 Live Tracking</h1>
        <div style="width:100px;"></div>
    </div>

    <div class="container">
        <div class="info-card">
            Tracking Number: <span id="awb-display">Loading...</span><br>
            <small id="carrier-info" style="color:#64748b; margin-top:5px; display:block;"></small>
        </div>
        
        <iframe id="tracking-frame" src="about:blank"></iframe>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const awb = params.get('awb')?.trim();

        if (!awb) {
            document.querySelector('.info-card').innerHTML = "❌ No tracking number provided.";
            return;
        }

        document.getElementById('awb-display').textContent = awb;
        const frame = document.getElementById('tracking-frame');

        let carrierName = "Auto";
        let url = "";

        const upper = awb.toUpperCase();

        if (upper.startsWith('D')) {
            carrierName = "DTDC";
            url = `https://www.dtdc.in/tracking.asp?track=${awb}`;
        } 
        else if (upper.startsWith('5006')) {
            carrierName = "Trackon";
            url = `https://www.trackon.in/track-shipment?awbno=${awb}`;
        } 
        else if (upper.startsWith('356') || upper.startsWith('19')) {
            carrierName = "Delhivery";
            url = `https://www.delhivery.com/track/package/${awb}`;
        } 
        else if (upper.startsWith('B')) {
            carrierName = "Bluedart";
            url = `https://www.bluedart.com/web/guest/trackdart-result?trackNo=${awb}`;
        } 
        else {
            // Fallback to 17Track
            carrierName = "17Track (Multi-Carrier)";
            frame.src = `https://www.17track.net/en/track?nums=${awb}`;
            document.getElementById('carrier-info').textContent = "Carrier: Multi Carrier Detection";
            return;
        }

        document.getElementById('carrier-info').textContent = `Carrier: ${carrierName}`;
        frame.src = url;
    </script>
</body>
</html>
