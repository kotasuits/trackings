<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Tracking Status</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://www.17track.net/externalcall.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0a0f1e;
            --card: rgba(20, 30, 55, .78);
            --txt: #f1f5f9;
            --muted: #94a3b8;
            --bdr: rgba(255, 255, 255, .09);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        body {
            background: var(--bg);
            background-image: radial-gradient(ellipse at 20% 0%, rgba(99, 102, 241, .15), transparent 50%);
            color: var(--txt);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container { width: 100%; max-width: 800px; margin-top: 20px; }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
            width: 100%;
            max-width: 800px;
        }
        .header h1 {
            font-size: 1.5rem;
            background: linear-gradient(135deg, #818cf8, #22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .back-btn {
            color: var(--muted);
            text-decoration: none;
            font-size: 1.6rem;
            padding: 8px 14px;
            border: 1px solid var(--bdr);
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            transition: all 0.2s;
            line-height: 1;
        }
        .back-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }

        #YQContainer {
            width: 100%;
            min-height: 650px;
            border-radius: 15px;
            overflow: hidden;
            background: white;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            position: relative;
        }

        .info-card {
            background: var(--card);
            border: 1px solid var(--bdr);
            padding: 18px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
        }
        .info-card span { color: var(--primary); font-weight: 700; }

        .delhivery-instruction {
            margin-top: 12px;
            padding: 12px 16px;
            background: rgba(251, 191, 36, 0.15);
            border: 1px solid rgba(251, 191, 36, 0.3);
            border-radius: 10px;
            color: #fbbf24;
            font-weight: 500;
            display: none;
        }

        /* Simple Ad Blocker Styles */
        .ad-blocked { display: none !important; }
    </style>
</head>
<body>

    <div class="header">
        <a href="javascript:history.back()" class="back-btn">←</a>
        <h1>🚚 Live Tracking</h1>
        <div style="width:50px;"></div>
    </div>

    <div class="container">
        <div class="info-card">
            Tracking Number: <span id="awb-display">Loading...</span>
            <div class="carrier-info" id="carrier-info"></div>
           
            <div class="delhivery-instruction" id="delhivery-msg">
                Type <strong>1</strong> in Postcode box and Confirm to check live tracking
            </div>
        </div>
       
        <div id="YQContainer">
            <div style="padding:80px; text-align:center; color:#666;">
                ⌛ Initializing Tracking Service...
            </div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const awb = params.get('awb')?.trim();

        if (!awb) {
            document.querySelector('.info-card').innerHTML = "❌ No tracking number provided.";
            document.getElementById('YQContainer').style.display = 'none';
        } else {
            document.getElementById('awb-display').textContent = awb;

            function getCarrierCode(trackingNum) {
                const num = trackingNum.toUpperCase().trim();

                if (num.startsWith('D')) {
                    document.getElementById('carrier-info').textContent = 'Carrier: DTDC';
                    return "100069";
                }
                if (num.startsWith('5006') || num.startsWith('1003')) {
                    document.getElementById('carrier-info').textContent = 'Carrier: Trackon';
                    return "100180";
                }
                if (num.startsWith('356') || num.startsWith('19')) {
                    document.getElementById('carrier-info').textContent = 'Carrier: Delhivery';
                    document.getElementById('delhivery-msg').style.display = 'block';
                    return "100060";
                }

                document.getElementById('carrier-info').textContent = 'Carrier: Auto Detecting...';
                return "0";
            }

            // ============== Simple Ad Blocker (Brave Style) ==============
            function activateAdBlocker() {
                const adSelectors = [
                    'iframe[src*="ads"]', 'iframe[src*="google"]', 'iframe[src*="doubleclick"]',
                    '.ad', '.ads', '.advert', '.banner', '.sponsor', '[id*="ad"]', '[class*="ad"]',
                    'ins.adsbygoogle', '.yq-ad', '.promo', 'div[style*="position: fixed"]'
                ];

                const observer = new MutationObserver(() => {
                    adSelectors.forEach(selector => {
                        document.querySelectorAll(selector).forEach(el => {
                            el.style.display = 'none';
                            el.classList.add('ad-blocked');
                            if (el.parentElement) el.parentElement.style.display = 'none';
                        });
                    });
                });

                observer.observe(document.getElementById('YQContainer'), { childList: true, subtree: true });
            }

            function initTracking() {
                if (typeof YQV5 !== 'undefined') {
                    document.getElementById('YQContainer').innerHTML = '';
                    const carrierCode = getCarrierCode(awb);

                    YQV5.trackSingle({
                        YQ_ContainerId: "YQContainer",
                        YQ_Height: 650,
                        YQ_Lang: "en",
                        YQ_Num: awb,
                        YQ_Fc: carrierCode
                    });

                    // Activate ad blocker after widget loads
                    setTimeout(activateAdBlocker, 1500);
                } else {
                    setTimeout(initTracking, 400);
                }
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initTracking);
            } else {
                initTracking();
            }
        }
    </script>
</body>
</html>
